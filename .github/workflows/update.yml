name: update
on:
  schedule:
    - cron: "24 15 * * *"
  workflow_dispatch:

jobs:
  update:
    name: update AWSWhitelist.json
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable

      - name: update for AWS SDK v1
        run: |
          ./update-whitelist.sh
          go generate ./...
        working-directory: ./xrayaws

      - name: update for AWS SDK v2
        run: |
          ./update-whitelist.sh
          go generate ./...
        working-directory: ./xrayaws-v2

      - uses: shogo82148/actions-commit-and-create-pr@b1322fe9da4037e9720e34ea221997cffcd3498d # v1.1.4
